version: '3.8'
services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '3000:3000'
    environment:
      - DATABASE_URL=postgres://idp_user:password@db:5432/idp_db
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: idp_user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: idp_db
    ports:
      - '5432:5432'
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U idp_user -d idp_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  db_data:
